{{ $images := $.Resources.ByType "image" -}}
{{ $file := .Params.feature_image }}
{{ $fimg := $images.GetMatch $file }}
{{ if $fimg }}
<img class="feature-image" 
     srcset="{{ ($fimg.Resize "480x webp photo q100").RelPermalink }} 480w, {{ ($fimg.Resize "800x webp photo q100").RelPermalink }} 800w"
     sizes="(max-width: 600px) 480px, 800px"
     src="{{ $fimg.RelPermalink }}"
     {{ with $.Params.feature_image_alt }}alt="{{ . }}"{{ else }}alt="Feature image"{{ end }}>
{{ end }}
